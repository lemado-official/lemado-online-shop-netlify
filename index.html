<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ulemdo Market — Secure Ecosystem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAV BAR -->
    <header class="navbar">
        <div class="logo">
            <span class="logo-u">U</span>LEMDO
        </div>
        <nav>
            <button class="nav-link" onclick="showPage('home')">Bosh sahifa</button>
            <button class="nav-link" onclick="showPage('stores')">Do'konlar</button>
            <button id="auth-login-btn" class="btn btn-orange" onclick="openModal('auth-modal')">Kirish</button>
            <div id="user-profile-wrap" class="profile-badge hidden" onclick="logout()">
                <div class="user-avatar">U</div>
                <span id="user-display-name">~NullReaper</span>
            </div>
        </nav>
    </header>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="toast hidden"></div>

    <!-- MAIN PAGES CONTAINER -->
    <main class="container">
        
        <!-- HOME PAGE -->
        <section id="page-home" class="page">
            <div class="hero">
                <h1>Xavfsiz va Ishonchli Raqamli Ekotizim</h1>
                <p>Ulemdo platformasida barcha ma'lumotlaringiz kiber-himoyalangan.</p>
            </div>
            
            ### Rasmiy Do'konlar ✓
            <div id="stores-grid-home" class="grid grid-stores"></div>

            ### Oxirgi Mahsulotlar 📦
            <div id="products-grid" class="grid grid-products"></div>
        </section>

        <!-- STORES PAGE -->
        <section id="page-stores" class="page hidden">
            <h3>Barcha Faol Do'konlar</h3>
            <div id="all-stores-grid" class="grid grid-stores"></div>
        </section>

    </main>

    <!-- AUTH MODAL (LOGIN / REGISTER) -->
    <div id="auth-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Tizimga kirish</h3>
                <span class="close-btn" onclick="closeModal('auth-modal')">&times;</span>
            </div>
            <form id="auth-form" onsubmit="handleAuth(event)">
                <div class="form-group">
                    <label>Foydalanuvchi nomi (Username)</label>
                    <input type="text" id="auth-username" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Parol</label>
                    <input type="password" id="auth-password" required>
                </div>
                <button type="submit" class="btn btn-orange btn-block">Tasdiqlash</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
