<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
    <title>uLemdo Bar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="browser-nav-bar">
        <div class="logo-mini">U</div>
        
        <div class="address-bar-container">
            <input type="text" id="url-input" placeholder="Sayt manzili yoki qidiruv so'rovi..." autocomplete="off">
            <button id="go-btn">O'tish</button>
        </div>

        <button id="login-btn" class="btn-auth" onclick="openModal()">Akkaunt</button>
    </div>

    <div id="auth-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>uLemdo Portal</h2>
            <input type="email" placeholder="username@ulemdo.uz" required>
            <input type="password" placeholder="Parol" required>
            <button class="btn-auth">Kirish</button>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
